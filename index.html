<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Kasir — Kafe Khasta</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--clr-surface-warm);
      padding: var(--space-lg);
      position: relative;
      overflow: hidden;
    }

    /* Decorative background shapes */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      z-index: 0;
    }

    body::before {
      width: 320px;
      height: 320px;
      background: var(--clr-primary);
      opacity: 0.06;
      top: -80px;
      right: -80px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: var(--clr-surface-dark);
      opacity: 0.04;
      bottom: -120px;
      left: -120px;
    }

    /* Login Card */
    .login-card {
      background: var(--clr-surface-dark);
      padding: var(--space-2xl) var(--space-xl);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 16px 48px rgba(43, 27, 25, 0.2);
    }

    .login-card .brand-mark {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: var(--fw-display);
      color: var(--clr-primary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: var(--space-xs);
    }

    .login-card .brand-sub {
      font-size: var(--fs-small);
      color: var(--clr-text-on-dark);
      opacity: 0.6;
      margin-bottom: var(--space-xl);
      letter-spacing: 0.06em;
    }

    .login-card h1 {
      font-family: var(--font-display);
      font-size: var(--fs-headline);
      font-weight: var(--fw-headline);
      color: var(--clr-text-on-dark);
      margin-bottom: var(--space-xs);
    }

    .login-card .subtitle {
      color: var(--clr-text-muted);
      font-size: var(--fs-small);
      margin-bottom: var(--space-xl);
    }

    .input-group {
      margin-bottom: var(--space-lg);
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: var(--fs-label);
      font-weight: var(--fw-label);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(245, 237, 228, 0.7);
      margin-bottom: var(--space-sm);
    }

    .input-box {
      position: relative;
    }

    .input-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--clr-primary);
      font-size: 0.95rem;
      z-index: 1;
    }

    .input-box input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--clr-rule-on-dark);
      background: rgba(255, 255, 255, 0.05);
      color: var(--clr-text-on-dark);
      font-size: var(--fs-body);
      outline: none;
      transition: var(--transition-base);
      font-family: var(--font-body);
    }

    .input-box input::placeholder {
      color: rgba(245, 237, 228, 0.3);
    }

    .input-box input:focus {
      border-color: var(--clr-primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px var(--clr-primary-glow);
    }

    .login-btn {
      width: 100%;
      padding: 12px 32px;
      margin-top: var(--space-sm);
      border-radius: var(--radius-md);
      border: none;
      background: var(--clr-primary);
      color: var(--clr-text-on-gold);
      font-size: var(--fs-body);
      font-weight: var(--fw-title);
      cursor: pointer;
      transition: var(--transition-base);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-sm);
      font-family: var(--font-body);
    }

    .login-btn:hover {
      background: var(--clr-primary-rich);
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    /* Footer */
    .login-footer {
      margin-top: var(--space-lg);
      font-size: var(--fs-small);
      color: rgba(245, 237, 228, 0.35);
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: var(--space-xl) var(--space-lg);
      }

      .login-card h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="brand-mark">Khasta</div>
    <div class="brand-sub">— Ruang Hangat —</div>

    <h1>Masuk</h1>
    <p class="subtitle">Silakan masuk ke akun kasir</p>

    <form onsubmit="masukDashboard(event)">
      <div class="input-group">
        <label for="username">Akun Kasir</label>
        <div class="input-box">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="username" placeholder="Masukkan ID atau Username" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Kata Sandi</label>
        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Masukkan kata sandi" required>
        </div>
      </div>

      <button type="submit" class="login-btn">
        Masuk
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>
    </form>

    <p class="login-footer">Kafe Khasta © 2026</p>
  </div>

  <script>
    function masukDashboard(event) {
      event.preventDefault();

      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      // Demo credentials
      const dbUsername = 'kasir1';
      const dbPassword = 'khasta123';

      if (user === dbUsername && pass === dbPassword) {
        window.location.href = 'dashboard.html';
      } else {
        alert('Login Gagal! Akun atau Kata Sandi salah. Silakan coba lagi.');
        document.getElementById('password').value = '';
      }
    }
  </script>

</body>
</html>
