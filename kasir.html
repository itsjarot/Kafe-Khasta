<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir — Kafe Khasta</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="kasir.css">
</head>
<body>

  <div class="kasir-header">
    <div class="kasir-header-left">
      <button class="btn-back" onclick="window.location.href='dashboard.html'">
        <i class="fa-solid fa-arrow-left"></i> Kembali
      </button>
      <h1>Dashboard Kasir</h1>
    </div>
    <button class="btn-export" onclick="exportDanReset()">
      <i class="fa-solid fa-download"></i> Export &amp; Reset
    </button>
  </div>

  <div class="board">
    <div class="column" id="col-baru">
      <h2>Baru</h2>
      <div class="cards" id="cards-baru"></div>
    </div>

    <div class="column" id="col-diproses">
      <h2>Diproses</h2>
      <div class="cards" id="cards-diproses"></div>
    </div>

    <div class="column" id="col-selesai">
      <h2>Selesai</h2>
      <div class="cards" id="cards-selesai"></div>
    </div>
  </div>

  <script src="kasir.js"></script>
</body>
</html>
