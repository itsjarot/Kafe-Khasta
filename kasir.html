<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Kasir - Khasta</title>
  <link rel="stylesheet" href="kasir.css">
</head>
<body>

  <div class="header-kasir">
    <div class="header-left">
      <button class="btn-back" onclick="window.location.href='dashboard.html'">← Kembali</button>
      <h1>Dashboard Kasir - Khasta</h1>
    </div>
    <button class="btn-export" onclick="exportDanReset()">⬇ Export &amp; Reset</button>
  </div>

  <div class="board">
    <div class="column" id="col-baru">
      <h2>Baru</h2>
      <div class="cards" id="cards-baru"></div>
    </div>

    <div class="column" id="col-diproses">
      <h2>Diproses</h2>
      <div class="cards" id="cards-diproses"></div>
    </div>

    <div class="column" id="col-selesai">
      <h2>Selesai</h2>
      <div class="cards" id="cards-selesai"></div>
    </div>
  </div>

  <script src="kasir.js"></script>
</body>
</html>
