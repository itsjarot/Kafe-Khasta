<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Meja - Khasta</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', Arial, sans-serif;
    }
    body {
      margin: 0;
      padding: 30px;
      background-color: #f4f1ee;
      text-align: center;
    }
    h1 {
      color: #5b3a29;
      margin: 0 0 20px;
    }

    /* ===== KONTROL JUMLAH MEJA ===== */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .controls label {
      font-size: 15px;
      color: #5b3a29;
      font-weight: 500;
    }
    .controls input {
      width: 70px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      text-align: center;
      color: #333;
    }
    .controls button {
      padding: 8px 20px;
      background-color: #5b3a29;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }
    .controls button:hover {
      background-color: #2b1b19;
    }

    /* ===== QR CARDS ===== */
    .meja-list {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    .meja-card {
      background: white;
      border-radius: 10px;
      padding: 24px 24px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 310px;
    }
    .meja-card h2 {
      margin: 0 0 16px;
      color: #5b3a29;
      text-align: center;
    }
    .qr-container {
      display: flex;
      justify-content: center;
    }
    .meja-card p {
      font-size: 11px;
      color: #888;
      word-break: break-all;
      text-align: center;
      margin: 14px 0 0;
    }
  </style>
</head>
<body>

  <h1>QR Code Meja - Khasta</h1>

  <div class="controls">
    <label for="jumlahInput">Jumlah Meja</label>
    <input type="number" id="jumlahInput" min="1" max="20" value="3">
    <button id="btnGenerate">Generate</button>
  </div>

  <div class="meja-list" id="meja-list"></div>

  <script>
    const BASE_URL = window.location.origin;
    const QR_SIZE = 250;

    const mejaList = document.getElementById('meja-list');
    const jumlahInput = document.getElementById('jumlahInput');
    const btnGenerate = document.getElementById('btnGenerate');

    function generateQR() {
      const jumlah = parseInt(jumlahInput.value) || 1;

      // Batasi 1-20
      const count = Math.min(Math.max(jumlah, 1), 20);
      jumlahInput.value = count;

      // Kosongkan container
      mejaList.innerHTML = '';

      // Buat kartu QR tiap meja
      for (let i = 1; i <= count; i++) {
        const url = `${BASE_URL}/order.html?meja=${i}`;

        const card = document.createElement('div');
        card.classList.add('meja-card');

        const qrId = `qr-${i}`;
        card.innerHTML = `
          <h2>Meja ${i}</h2>
          <div class="qr-container" id="${qrId}"></div>
          <p>${url}</p>
        `;

        mejaList.appendChild(card);

        new QRCode(document.getElementById(qrId), {
          text: url,
          width: QR_SIZE,
          height: QR_SIZE
        });
      }
    }

    // Generate saat tombol diklik
    btnGenerate.addEventListener('click', generateQR);

    // Generate juga saat Enter di input
    jumlahInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generateQR();
    });

    // Generate pertama kali
    generateQR();
  </script>

</body>
</html>
